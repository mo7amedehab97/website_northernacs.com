name: ESLint Changed Files

on:
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.css'
      - '**/*.json'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'scripts/eslint-files.mjs'
      - '.prettierrc.cjs'
      - '.prettierignore'
      - '.github/workflows/eslint-changed-files.yml'

jobs:
  lint-changed-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier
        run: npm run format:check

      - name: Collect changed files
        id: changed-files
        shell: bash
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          if [[ "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              base_sha="$(git rev-parse HEAD^)"
            else
              base_sha="$(git hash-object -t tree /dev/null)"
            fi
          fi

          mapfile -d '' files < <(
            git diff --name-only --diff-filter=ACMR -z "$base_sha" "$head_sha" -- \
              '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs'
          )

          if (( ${#files[@]} == 0 )); then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo 'has_files=true'
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Lint changed files
        if: steps.changed-files.outputs.has_files == 'true'
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
        run: |
          printf '%s\n' "$CHANGED_FILES" | node scripts/eslint-files.mjs --stdin
